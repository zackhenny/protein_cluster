# ============================================================================
# plm-cluster configuration
# ============================================================================
# This file controls every tuneable parameter of the pipeline.
# Any key you omit here falls back to built-in defaults.
# Copy this file and edit to taste: plm_cluster run-all --config my_config.yaml

seed: 42                          # Global random seed for reproducibility

# ---------------------------------------------------------------------------
# External tool paths
# ---------------------------------------------------------------------------
# Leave empty ("") to auto-detect from $PATH.  Set full paths if tools are
# installed in non-standard locations (e.g. HPC module loads).
tools:
  mmseqs_path: ""                 # Path to mmseqs binary
  hhmake_path: ""                 # Path to hhmake (HH-suite)
  hhsearch_path: ""               # Path to hhsearch (HH-suite, for db-search mode)
  hhalign_path: ""                # Path to hhalign (HH-suite, for pairwise mode)
  ffindex_build_path: ""          # Path to ffindex_build (HH-suite, for db-search mode)
  cstranslate_path: ""            # Path to cstranslate (HH-suite, for db-search mode)
  mafft_path: ""                  # Path to mafft aligner
  mcl_path: ""                    # Path to mcl (only if --method mcl)

# ---------------------------------------------------------------------------
# Step 1 — MMseqs2 subfamily clustering
# ---------------------------------------------------------------------------
# Proteins are clustered into subfamilies at high sequence identity.
# Each subfamily gets a representative sequence used downstream.
mmseqs:
  mode: linclust                  # "linclust" (fast linear) or "cluster" (sensitive)
  min_seq_id: 0.6                 # Minimum sequence identity to join a cluster [0-1]
  coverage: 0.8                   # Minimum alignment coverage fraction [0-1]
  cov_mode: 1                     # MMseqs2 coverage mode (0=query, 1=target, 2=bidirectional)
  evalue: 1e-3                    # E-value threshold for clustering
  sensitivity: 7.5                # Sensitivity (-s); ignored for linclust mode
  threads: 16                     # CPU threads for MMseqs2 (and profile/edge workers)
  tmpdir: tmp/mmseqs              # Temporary directory for MMseqs2

# ---------------------------------------------------------------------------
# Step 2 — Subfamily profile construction (MAFFT + HH-suite)
# ---------------------------------------------------------------------------
# MSAs and HMM profiles are built for each subfamily.
profiles:
  max_members_per_subfamily: 256  # Cap sequences per subfamily MSA to limit memory

# ---------------------------------------------------------------------------
# Step 3 — HMM-HMM edge construction (hhalign / hhsearch)
# ---------------------------------------------------------------------------
# Profile-profile alignments detect remote homology between subfamilies.
# Two edge tiers are produced: strict ("core") and relaxed ("functional").
hmm_hmm:
  # Three modes are available:
  #   pairwise       – one hhalign per candidate pair (thread-parallel, default)
  #   db-search      – build HH-suite ffindex DB + one parallel hhsearch per query
  #   mmseqs-profile – MMseqs2 profile-profile all-vs-all; fastest for large
  #                    datasets (220K+ families), requires only mmseqs in PATH.
  mode: pairwise                  # "pairwise" | "db-search" | "mmseqs-profile"
  topN: 200                       # Max candidate neighbors per subfamily from KNN
  # --- Core (strict) edge thresholds ---
  mincov_core: 0.70               # Min bidirectional alignment coverage [0-1]
  min_prob_core: 90               # Min HHalign probability [0-100]
  max_evalue_core: 1e-5           # Max E-value (alternative to probability gate)
  min_aln_len_core: 120           # Min aligned columns (amino acids)
  # --- Relaxed (functional) edge thresholds ---
  mincov_relaxed: 0.60            # Broader coverage tolerance [0-1]
  min_prob_relaxed: 80            # Lower probability gate [0-100]
  max_evalue_relaxed: 1e-3        # Relaxed E-value gate
  min_aln_len_relaxed: 80         # Shorter alignment tolerance

# ---------------------------------------------------------------------------
# Step 4 — ESM-2 protein language model embeddings
# ---------------------------------------------------------------------------
# Mean-pooled residue embeddings are computed on subfamily reps and used for
# KNN candidate generation and (optionally) functional graph edges.
embed:
  esm_model_name: esm2_t33_650M_UR50D   # Model identifier (for metadata only)
  pooling: mean                          # Pooling strategy: "mean" (residue avg)
  long_seq_policy: truncate              # "truncate" | "skip" | "full"
  max_len: 2048                          # Max residues per sequence (truncate above)
  batch_size: 4                          # Sequences per forward pass
  device: cpu                            # "cpu" or "cuda" / "cuda:0" for GPU

# ---------------------------------------------------------------------------
# Step 5 — Candidate neighbor generation (embedding space)
# ---------------------------------------------------------------------------
# Two modes are available for generating candidate edges from ESM-2 embeddings:
#
#   knn   (default) — Standard FAISS/sklearn cosine KNN.  Fast, unsupervised.
#   rkcnn           — Random K-Conditional Nearest Neighbor.  Supervised ensemble
#                     that leverages MMseqs2 subfamily labels as classes and uses
#                     random feature subspaces to overcome the curse of
#                     dimensionality in high-dimensional embedding space.
#                     Paper: https://peerj.com/articles/cs-2497/
#
# Both modes produce the same output TSV format so downstream steps are
# unaffected by the choice of mode.
knn:
  mode: knn                       # "knn" (default) | "rkcnn"
  k: 100                          # Number of nearest neighbors to retrieve
  min_cosine: 0.35                # Min cosine similarity to keep an edge [-1, 1]
  min_len_ratio: 0.5              # Min query/target length ratio filter
  max_len_ratio: 2.0              # Max query/target length ratio filter

  # --- GPU acceleration for KNN / rKCNN ------------------------------------
  # Set to "cuda" (or "cuda:0", "cuda:1", etc.) to use FAISS-GPU for the KNN
  # index and (when mode=rkcnn) for the cascading FAISS pre-filter and rKCNN
  # pairwise-distance computations via PyTorch.  Requires the faiss-gpu
  # package; falls back to CPU FAISS or sklearn if unavailable.
  device: cpu                     # "cpu" or "cuda" / "cuda:0" for GPU

  # --- rKCNN-specific (only used when mode: rkcnn) --------------------------
  # rKCNN operates directly on full-dimensional ESM-2 embeddings — do NOT apply
  # PCA or any dimensionality reduction.  Embeddings are L2-normalized before
  # fitting.  MMseqs2 subfamily IDs (from Step 1) serve as ground-truth class
  # labels.
  #
  # Cascading strategy: When there are tens of thousands of subfamilies,
  # computing conditional neighbors against all classes is expensive.  Set
  # rkcnn_cascade_topn > 0 to first use FAISS to retrieve the top-N closest
  # subfamily centroids per query, then run rKCNN only over those N classes.
  rkcnn_n_subspaces: 50           # Number of random feature subspaces to sample
  rkcnn_subspace_fraction: 0.5    # Fraction of embedding dims per subspace [0.01–1.0]
  rkcnn_n_neighbors: 5            # k for the inner kCNN classifiers (per subspace)
  rkcnn_score_threshold: 0.0      # Min separation score to retain a subspace (0 = keep all)
  rkcnn_weighting: separation     # "separation" (score-weighted) | "uniform"
  rkcnn_cascade_topn: 500         # FAISS pre-filter: top-N candidate classes (0 = disabled)
  rkcnn_random_state: 42          # Random seed for subspace sampling

# ---------------------------------------------------------------------------
# Step 6 — Graph merge and Leiden clustering
# ---------------------------------------------------------------------------
# Two graphs are constructed (strict & functional) and clustered separately.
graph:
  # How to combine HMM and embedding edges for the functional graph:
  #   strict              — HMM core edges only (ignore embeddings)
  #   union               — max(hmm, emb) weight
  #   gated               — embedding edges only if weak HMM support exists
  #   downweight_embeddings — w_hmm*hmm + w_emb*emb (recommended)
  edge_weight_policy: downweight_embeddings
  w_hmm: 1.0                     # HMM edge weight multiplier
  w_emb: 0.35                    # Embedding edge weight multiplier
  weak_hmm_threshold: 0.2        # Min HMM weight to allow embedding boost (gated)
  leiden_resolution_strict: 0.7   # Leiden resolution for strict families (lower = larger)
  leiden_resolution_functional: 1.0  # Leiden resolution for functional families
  seed: 42                        # Random seed for Leiden

# ---------------------------------------------------------------------------
# Step 7 — Protein-to-family mapping
# ---------------------------------------------------------------------------
# Full-length proteins are aligned against subfamily reps with mmseqs easy-search.
# A greedy overlap filter prevents the same protein region from being assigned
# to multiple families (fusion-safe mapping).
mapping:
  search_mode: family_reps        # Search strategy (currently only family_reps)
  profile_cov_min: 0.70           # Min fraction of profile (target) covered [0-1]
  min_prob: 90                    # Min percent identity to accept a hit [0-100]
  max_evalue: 1e-5                # Max E-value for mmseqs easy-search
  min_segment_len: 120            # Min alignment length (aa) to accept a segment
  max_overlap_aa: 30              # Max overlap (aa) between accepted segments

# ---------------------------------------------------------------------------
# Step 8 — Output matrices
# ---------------------------------------------------------------------------
outputs:
  write_dense_threshold: 2000000  # Max cells before skipping dense matrix output
  write_matrix_market: true       # Also write Matrix Market (.mtx) format
