name: plm_cluster
channels:
  - conda-forge
  - bioconda
  - pytorch
dependencies:
  - python=3.11
  - pip
  - mmseqs2
  - hhsuite                        # provides hhmake, hhalign, hhsearch, ffindex_build
  - mafft
  - mcl
  - numpy
  - scipy
  - pandas
  - pyyaml
  - scikit-learn
  - python-igraph
  - leidenalg
  - pytorch
  - faiss-cpu
  # For GPU-accelerated KNN/rKCNN, replace faiss-cpu with faiss-gpu:
  #   conda install -c conda-forge faiss-gpu
  # or install via pip: pip install faiss-gpu
  # The pipeline auto-detects GPU FAISS when knn.device is set to "cuda".
  - iniconfig
  - pygments
  - pip:
      - fair-esm
      - pytest
      - polars

# Install this repo after env creation (HPC-safe, forces pip into env):
#   bash scripts/install_in_conda_env.sh plm_cluster . test,embed
# Or manually:
#   conda activate plm_cluster
#   python -m pip install --no-build-isolation --no-user .
#
# The hhsuite package provides all HH-suite binaries needed for both
# pairwise (hhalign) and db-search (hhsearch + ffindex_build) modes.

variables:
  PYTHONNOUSERSITE: "1"
  PIP_USER: "0"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
