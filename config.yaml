# plm-cluster configuration — edit values below, then pass with --config config.yaml

seed: 42

tools:
  # Leave empty to auto-detect from $PATH, or set absolute paths
  mmseqs_path: ""
  hhmake_path: ""
  hhsearch_path: ""
  hhalign_path: ""
  ffindex_build_path: ""
  cstranslate_path: ""
  mafft_path: ""
  mcl_path: ""

mmseqs:
  # Step 1 — MMseqs2 subfamily clustering
  mode: linclust
  min_seq_id: 0.6
  coverage: 0.8
  cov_mode: 1
  evalue: 1.0e-3
  sensitivity: 7.5
  threads: 16
  tmpdir: tmp/mmseqs

profiles:
  # Step 2 — MAFFT + hhmake profile construction
  max_members_per_subfamily: 256

hmm_hmm:
  # Step 3 — HMM-HMM profile-profile edges via hhalign, hhsearch, or MMseqs2
  # mode: "pairwise"      – one hhalign per candidate pair (thread-parallel)
  #        "db-search"    – one hhsearch per query against full ffindex DB
  #        "mmseqs-profile" – MMseqs2 all-vs-all profile search; fastest for
  #                           large datasets (220K+ families); requires only
  #                           mmseqs in PATH, no extra HH-suite tools.
  mode: pairwise                    # "pairwise" | "db-search" | "mmseqs-profile"
  topN: 200
  mincov_core: 0.70
  min_prob_core: 90
  max_evalue_core: 1.0e-5
  min_aln_len_core: 120
  mincov_relaxed: 0.60
  min_prob_relaxed: 80
  max_evalue_relaxed: 1.0e-3
  min_aln_len_relaxed: 80

embed:
  # Step 4 — ESM-2 embeddings. Set device to 'cuda' for GPU.
  esm_model_name: esm2_t33_650M_UR50D
  pooling: mean
  long_seq_policy: truncate
  max_len: 2048
  batch_size: 4
  device: cpu

knn:
  # Step 5 — Candidate neighbor generation from embeddings
  # mode: "knn"    — Standard FAISS/sklearn cosine KNN (default, fast)
  #        "rkcnn" — Random K-Conditional Nearest Neighbor (supervised ensemble;
  #                  uses MMseqs2 subfamily labels + random subspaces to find
  #                  discriminative neighbors in high-dimensional embedding space).
  #                  See docs/rkcnn_implementation_plan.md for algorithm details.
  #                  Paper: https://peerj.com/articles/cs-2497/
  mode: knn
  k: 100
  min_cosine: 0.35
  min_len_ratio: 0.5
  max_len_ratio: 2.0
  # --- GPU acceleration ---
  # Set device to "cuda" to use FAISS-GPU for the KNN index and (when mode=rkcnn)
  # for the cascading pre-filter and rKCNN distance computations.
  # Requires the faiss-gpu package (pip install faiss-gpu, or conda install
  # faiss-gpu from conda-forge).  Falls back to CPU FAISS / sklearn if
  # faiss-gpu is not installed or device is "cpu".
  device: cpu                    # "cpu" | "cuda" | "cuda:0" etc.
  # --- rKCNN-specific parameters (only used when mode: rkcnn) ---
  # rKCNN operates on full-dimensional ESM-2 embeddings (no PCA/dimensionality
  # reduction) and uses random feature subspaces to defeat the curse of
  # dimensionality.  Embeddings are L2-normalized before fitting.
  rkcnn_n_subspaces: 50        # Number of random feature subspaces to sample
  rkcnn_subspace_fraction: 0.5 # Fraction of embedding dimensions per subspace (0.01–1.0)
  rkcnn_n_neighbors: 5         # k for the inner kCNN classifiers in each subspace
  rkcnn_score_threshold: 0.0   # Min separation score to retain a subspace (0 = keep all)
  rkcnn_weighting: separation  # Subspace aggregation: "separation" (weighted by score) | "uniform"
  rkcnn_cascade_topn: 500      # FAISS pre-filter: retrieve top-N candidate classes per query
                                # before running rKCNN.  Set to 0 to disable cascading and use
                                # all classes (accurate but slow for >10K subfamilies).
  rkcnn_random_state: 42       # Random seed for reproducible subspace sampling

graph:
  # Step 6 — Graph merge and Leiden clustering. Policy: strict|union|gated|downweight_embeddings
  edge_weight_policy: downweight_embeddings
  w_hmm: 1.0
  w_emb: 0.35
  weak_hmm_threshold: 0.2
  leiden_resolution_strict: 0.7
  leiden_resolution_functional: 1.0
  seed: 42

mapping:
  # Step 7 — Protein-to-family mapping with fusion-safe overlap filtering
  search_mode: family_reps
  profile_cov_min: 0.70
  min_prob: 90
  max_evalue: 1.0e-5
  min_segment_len: 120
  max_overlap_aa: 30

outputs:
  # Step 8 — Output matrix options
  write_dense_threshold: 2000000
  write_matrix_market: true

orthofinder:
  # OrthoFinder integration — subclustering of HOG/OG FASTA files
  # Used by: plm_cluster orthofinder-cluster  and  plm_cluster run-all-orthofinder
  #
  # Proteins within a HOG/OG are already orthologous, so subclustering at the
  # standard 60% identity threshold (mmseqs.min_seq_id) would collapse many
  # distinct paralog lineages.  These parameters control the finer-grained
  # within-OG subclustering step.
  subcluster_min_seq_id: 0.4    # Min seq identity within an OG (lower than global mmseqs.min_seq_id)
  subcluster_coverage: 0.8      # Min alignment coverage for within-OG subclustering
  subcluster_cov_mode: 1        # MMseqs2 coverage mode (0=query, 1=target, 2=bidirectional)
  min_og_size_for_subclustering: 2  # OGs with fewer members skip MMseqs2; each protein → own subfamily
